name: Automasi CI & Docker Build

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run MLflow Project Training
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python modelling_tuning.py
          
      - name: Save Artifact to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: trained-model-artifact
          path: saved_model/

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          mlflow models build-docker -m saved_model -n ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest